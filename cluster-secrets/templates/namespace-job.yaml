{{- $namespaces := include "cluster-secrets.namespaces" . | fromJsonArray -}}
{{- $filtered := list -}}
{{- range $namespaces -}}
  {{- if ne . $.Release.Namespace -}}
    {{- $filtered = append $filtered . -}}
  {{- end -}}
{{- end -}}
{{- if $filtered }}
{{- $sa := .Values.serviceAccount.name }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $sa }}
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-ns-creator
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-ns-creator
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-10"
subjects:
  - kind: ServiceAccount
    name: {{ $sa }}
    namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Release.Name }}-ns-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-create-ns
  namespace: {{ .Release.Namespace }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-delete-policy: hook-succeeded
spec:
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      restartPolicy: Never
      serviceAccountName: {{ $sa }}
      containers:
        - name: create
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              {{- range $filtered }}
              kubectl create namespace {{ . }} --dry-run=client -o yaml | kubectl apply -f -
              {{- end }}
{{- end }}
