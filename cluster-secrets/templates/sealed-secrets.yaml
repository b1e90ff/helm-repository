{{- range $secret := .Values.sealedSecrets }}
{{- $name := $secret.name | required "sealedSecrets[].name is required" }}
{{- $type := $secret.type | required (printf "sealedSecrets.%s.type is required" $name) }}
{{- $encryptedData := $secret.encryptedData | required (printf "sealedSecrets.%s.encryptedData is required" $name) }}

{{/* Determine target namespaces */}}
{{- $targets := list }}
{{- if $secret.namespaces }}
  {{- if ne $secret.scope "cluster-wide" }}
    {{- fail (printf "sealedSecrets.%s: 'namespaces' requires scope: cluster-wide" $name) }}
  {{- end }}
  {{- $targets = $secret.namespaces }}
{{- else if $secret.namespace }}
  {{- $targets = list $secret.namespace }}
{{- else }}
  {{- fail (printf "sealedSecrets.%s: 'namespace' or 'namespaces' is required" $name) }}
{{- end }}

{{- range $ns := $targets }}
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: {{ $name }}
  namespace: {{ $ns }}
  {{- if eq $secret.scope "cluster-wide" }}
  annotations:
    sealedsecrets.bitnami.com/cluster-wide: "true"
  {{- end }}
spec:
  encryptedData:
    {{- range $key, $value := $encryptedData }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
  template:
    type: {{ $type }}
    metadata:
      name: {{ $name }}
      namespace: {{ $ns }}
      {{- if eq $secret.scope "cluster-wide" }}
      annotations:
        sealedsecrets.bitnami.com/cluster-wide: "true"
      {{- end }}
{{- end }}
{{- end }}
