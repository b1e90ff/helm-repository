apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
      annotations:
        checksum/script: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      containers:
        - name: proxy
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "/app/server.py"]
          ports:
            - containerPort: 8080
          env:
            {{- if .Values.target.secretName }}
            - name: NTFY_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.target.secretName }}
                  key: {{ .Values.target.urlKey }}
            - name: NTFY_HEADERS
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.target.secretName }}
                  key: {{ .Values.target.authHeaderKey }}
            {{- end }}
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 30
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: script
              mountPath: /app
              readOnly: true
      volumes:
        - name: script
          configMap:
            name: {{ .Release.Name }}-script
