apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  server.py: |
    #!/usr/bin/env python3
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json, os, urllib.request, sys

    NTFY_URL = os.environ.get("NTFY_URL", "")
    NTFY_HEADERS_RAW = os.environ.get("NTFY_HEADERS", "{}")

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            try:
                length = int(self.headers.get("Content-Length", 0))
                body = json.loads(self.rfile.read(length)) if length else {}

                severity = body.get("severity", "info")
                obj = body.get("involvedObject", {})
                kind = obj.get("kind", "Unknown")
                name = obj.get("name", "unknown")
                namespace = obj.get("namespace", "")
                message = body.get("message", "No message")
                metadata = body.get("metadata", {})
                cluster = metadata.get("cluster", "")

                msg_lower = message.lower()

                if severity == "error":
                    priority = 5
                    tags = ["rotating_light", "fire"]
                    title = f"[{cluster}] {kind}/{name}"
                    status = "Error"
                elif "rollback" in msg_lower:
                    priority = 4
                    tags = ["warning", "arrows_counterclockwise"]
                    title = f"[{cluster}] Rollback: {name}"
                    status = "Rollback"
                elif "succeeded" in msg_lower or "applied" in msg_lower:
                    priority = 3
                    tags = ["white_check_mark", "package"]
                    title = f"[{cluster}] {name}"
                    status = "Success"
                else:
                    priority = 3
                    tags = ["information_source"]
                    title = f"[{cluster}] {kind}/{name}"
                    status = "Info"

                lines = [f"**{status}:** {message}"]
                if namespace:
                    lines.append(f"Namespace: `{namespace}`")
                lines.append(f"Resource: `{kind}/{name}`")

                ntfy_payload = json.dumps({
                    "title": title,
                    "message": "\n".join(lines),
                    "priority": priority,
                    "tags": tags,
                    "markdown": True,
                }).encode()

                # Build headers — protect Content-Type from being overwritten
                headers = {"Content-Type": "application/json"}
                try:
                    extra = json.loads(NTFY_HEADERS_RAW)
                    extra.pop("Content-Type", None)
                    headers.update(extra)
                except Exception:
                    pass

                req = urllib.request.Request(NTFY_URL, data=ntfy_payload, headers=headers, method="POST")
                urllib.request.urlopen(req, timeout=10)

                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
            except Exception as e:
                print(f"Error: {e}", file=sys.stderr, flush=True)
                self.send_response(500)
                self.end_headers()
                self.wfile.write(str(e).encode())

        def log_message(self, format, *args):
            pass

    if not NTFY_URL:
        print("NTFY_URL not set", file=sys.stderr)
        sys.exit(1)

    print(f"Listening on :8080, forwarding to {NTFY_URL}", flush=True)
    HTTPServer(("", 8080), Handler).serve_forever()
