apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-script
  namespace: {{ .Release.Namespace }}
data:
  server.py: |
    #!/usr/bin/env python3
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import json, os, urllib.request, sys

    NTFY_URL = os.environ.get("NTFY_URL", "")
    NTFY_HEADERS_RAW = os.environ.get("NTFY_HEADERS", "{}")

    class Handler(BaseHTTPRequestHandler):
        def do_POST(self):
            try:
                length = int(self.headers.get("Content-Length", 0))
                body = json.loads(self.rfile.read(length)) if length else {}

                severity = body.get("severity", "info")
                obj = body.get("involvedObject", {})
                kind = obj.get("kind", "Unknown")
                name = obj.get("name", "unknown")
                message = body.get("message", "No message")
                metadata = body.get("metadata", {})
                env = metadata.get("env", "")
                cluster = metadata.get("cluster", "")

                msg_lower = message.lower()

                if severity == "error":
                    priority = 5
                    tags = ["rotating_light"]
                    title = f"[{env}] {kind}/{name}"
                elif "rollback" in msg_lower:
                    priority = 4
                    tags = ["warning"]
                    title = f"[{env}] Rollback: {name}"
                elif "succeeded" in msg_lower or "applied" in msg_lower:
                    priority = 3
                    tags = ["white_check_mark"]
                    title = f"[{env}] {name}"
                else:
                    priority = 3
                    tags = ["information_source"]
                    title = f"[{env}] {kind}/{name}"

                ntfy_payload = json.dumps({
                    "title": title,
                    "message": message,
                    "priority": priority,
                    "tags": tags,
                }).encode()

                headers = {"Content-Type": "application/json"}
                try:
                    extra = json.loads(NTFY_HEADERS_RAW)
                    headers.update(extra)
                except Exception:
                    pass

                req = urllib.request.Request(NTFY_URL, data=ntfy_payload, headers=headers, method="POST")
                urllib.request.urlopen(req, timeout=10)

                self.send_response(200)
                self.end_headers()
                self.wfile.write(b"ok")
            except Exception as e:
                print(f"Error: {e}", file=sys.stderr, flush=True)
                self.send_response(500)
                self.end_headers()
                self.wfile.write(str(e).encode())

        def log_message(self, format, *args):
            pass

    if not NTFY_URL:
        print("NTFY_URL not set", file=sys.stderr)
        sys.exit(1)

    print(f"Listening on :8080, forwarding to {NTFY_URL}", flush=True)
    HTTPServer(("", 8080), Handler).serve_forever()
