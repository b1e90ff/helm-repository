image:
  repository: binwiederhier/ntfy
  tag: v2.21.0
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80

externalRouting:
  enabled: false
  hostname: ""
  gateway:
    name: istio-gateway
    namespace: istio-gateway

server:
  baseUrl: ""
  behindProxy: true
  cacheDuration: "24h"

  # iOS instant push — forwards poll requests to ntfy.sh (no message content leaves your server)
  upstreamBaseUrl: "https://ntfy.sh"

  # PostgreSQL connection (replaces SQLite for cache + auth)
  # Format: postgres://user:password@host:port/dbname?sslmode=disable
  databaseUrl: ""

  # Auth
  authDefaultAccess: "deny-all"
  enableSignup: false
  enableLogin: false

  # Web UI (disable to hide dashboard from public)
  webRoot: "disable"

  # Rate limiting
  visitorSubscriptionLimit: 30
  visitorRequestLimitBurst: 60
  visitorRequestLimitReplenish: "5s"
  visitorMessageDailyLimit: 500

  # Message limits
  messageSizeLimit: "4k"
  messageDelayLimit: "3d"

  # Attachments
  attachmentFileSizeLimit: "15M"
  attachmentTotalSizeLimit: "1G"
  attachmentExpiryDuration: "3h"

  # Keepalive
  keepaliveInterval: "45s"

  # Logging
  logLevel: "info"
  logFormat: "json"

# Kubernetes Secret containing the database URL (key: database-url)
# Use this instead of server.databaseUrl to keep credentials out of values
databaseSecret: ""

resources:
  limits:
    cpu: 500m
    memory: 256Mi
  requests:
    cpu: 50m
    memory: 64Mi

securityContext:
  runAsNonRoot: true
  runAsUser: 65534
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

podSecurityContext:
  fsGroup: 65534
