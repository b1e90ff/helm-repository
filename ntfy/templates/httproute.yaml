{{- if .Values.externalRouting.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ntfy.fullname" . }}
  labels:
{{ include "ntfy.labels" . | indent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.externalRouting.gateway.name }}
      namespace: {{ .Values.externalRouting.gateway.namespace }}
  {{- if .Values.externalRouting.hostname }}
  hostnames:
    - {{ .Values.externalRouting.hostname | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/"
      backendRefs:
        - name: {{ include "ntfy.fullname" . }}
          port: {{ .Values.service.port }}
{{- end }}
