apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ntfy.fullname" . }}
  labels:
{{ include "ntfy.labels" . | indent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
{{ include "ntfy.selectorLabels" . | indent 6 }}
  template:
    metadata:
      labels:
{{ include "ntfy.selectorLabels" . | indent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
    spec:
      securityContext:
{{ toYaml .Values.podSecurityContext | indent 8 }}
      {{- if and .Values.users .Values.credentialsSecret }}
      initContainers:
        - name: setup-users
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command: ["sh", "-c"]
          args:
            - |
              set -e
              {{- range .Values.users }}
              {{- $userName := .name }}
              NTFY_PASSWORD="${{ .passwordKey | upper | replace "-" "_" }}" ntfy user add {{ if eq .role "admin" }}--role=admin {{ end }}{{ .name }} 2>/dev/null || \
              NTFY_PASSWORD="${{ .passwordKey | upper | replace "-" "_" }}" ntfy user change-pass {{ .name }}
              {{- range .access }}
              ntfy access {{ $userName }} {{ .topic | quote }} {{ .permission }}
              {{- end }}
              {{- end }}
          env:
            {{- range .Values.users }}
            - name: {{ .passwordKey | upper | replace "-" "_" }}
              valueFrom:
                secretKeyRef:
                  name: {{ $.Values.credentialsSecret }}
                  key: {{ .passwordKey }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
              readOnly: true
            - name: cache
              mountPath: /var/cache/ntfy
      {{- end }}
      containers:
        - name: ntfy
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["serve"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          securityContext:
{{ toYaml .Values.securityContext | indent 12 }}
          resources:
{{ toYaml .Values.resources | indent 12 }}
          volumeMounts:
            - name: config
              mountPath: /etc/ntfy
              readOnly: true
            - name: cache
              mountPath: /var/cache/ntfy
      volumes:
        - name: config
          configMap:
            name: {{ include "ntfy.fullname" . }}
        - name: cache
          emptyDir: {}
